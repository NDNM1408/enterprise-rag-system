services:
  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"    # S3 API
      - "9001:9001"    # Web Console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  postgres:
    image: pgvector/pgvector:pg17
    container_name: postgres
    ports:
      - "5435:5432"
    environment:
      POSTGRES_USER: datahub
      POSTGRES_PASSWORD: datahub
      POSTGRES_DB: datahub
    volumes:
      - pgvector-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 30s
      timeout: 10s
      retries: 5


  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # Management Console
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmqctl", "status"]
      interval: 30s
      timeout: 10s
      retries: 5

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: litellm
    ports:
      - "4000:4000"    # LiteLLM API
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    volumes:
      - ./litellm-config.yaml:/app/config.yaml
    command: --config /app/config.yaml --port 4000 --num_workers 1
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:4000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  data-api:
    build:
      context: ./data-api
      dockerfile: Dockerfile
    container_name: data-api
    ports:
      - "8000:8000"
    environment:
      PGSQL_SCHEMA: public
      DATABASE_URL: postgresql+asyncpg://datahub:datahub@postgres:5432/datahub
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      BUCKET_NAME: data-hub-preprocessing
      PORT: 8000
      MODE: dev
      S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_DEFAULT_REGION: ap-southeast-1
      AWS_SESSION_TOKEN: ""
      # Document-parsing orchestrator wiring
      DOCUMENT_PARSING_URL: http://document-parsing-api:8002
      DOCUMENT_PARSING_CALLBACK_BASE: http://data-api:8000
      # Embedding gateway (mirror data-processing-job-worker so query
      # embedding matches chunk embedding — different models -> 0 results).
      EMBEDDING_API_BASE: ${EMBEDDING_API_BASE:-http://litellm:4000/v1}
      EMBEDDING_MODEL_NAME: ${EMBEDDING_MODEL_NAME:-rag-embedding-model}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-fake}
      # Chatbot LLM (merged from chatbot-service)
      LITELLM_API_BASE: ${LITELLM_API_BASE:-http://litellm:4000/v1}
      LITELLM_API_KEY: ${LITELLM_API_KEY:-fake}
      DATA_API_URL: http://data-api:8000
      # Elasticsearch (llm-wiki rag_mode)
      ELASTICSEARCH_URL: http://elasticsearch:9200
    volumes:
      - ./data-api/src:/app/src:ro
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      document-parsing-api:
        condition: service_started
    restart: unless-stopped

  document-parsing-api:
    build:
      context: ./document-parsing
      dockerfile: Dockerfile
    container_name: document-parsing-api
    command: ["./docker-entrypoint-api.sh"]
    ports:
      - "8002:8002"
    environment:
      PORT: 8002
      MAX_UPLOAD_MB: ${MAX_UPLOAD_MB:-500}
      # Share the same Postgres — document-parsing migrations create the
      # `parsing` schema next to data-api's `public` schema.
      DATABASE_URL: postgresql://datahub:datahub@postgres:5432/datahub
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      S3_ENDPOINT_URL: http://minio:9000
      S3_BUCKET: ${DOCUMENT_PARSING_BUCKET:-document-parsing}
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_DEFAULT_REGION: ap-southeast-1
      MINERU_MODELS_DIR: /opt/mineru/models_onnx
      MINERU_DPI: ${MINERU_DPI:-200}
      PDF_HYBRID_MODE: ${PDF_HYBRID_MODE:-true}
      PDF_FORCE_PLAIN: ${PDF_FORCE_PLAIN:-true}
      PARSE_TABLE_WIRELESS: ${PARSE_TABLE_WIRELESS:-false}
      DEVICE_LAYOUT: ${DEVICE_LAYOUT:-cpu}
      DEVICE_OCR_DET: ${DEVICE_OCR_DET:-cpu}
      DEVICE_OCR_REC: ${DEVICE_OCR_REC:-cpu}
      DEVICE_ORIENT: ${DEVICE_ORIENT:-cpu}
      DEVICE_TABLE_CLS: ${DEVICE_TABLE_CLS:-cpu}
      DEVICE_TABLE_REC: ${DEVICE_TABLE_REC:-cpu}
      SSL_CERT_FILE: /etc/ssl/certs/ca-certificates.crt
      PYTHONUNBUFFERED: "1"
    volumes:
      - ./document-parsing/src:/app/src:ro
      - ./document-parsing/models/models_onnx:/opt/mineru/models_onnx:ro
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  document-parsing-worker:
    build:
      context: ./document-parsing
      dockerfile: Dockerfile
    container_name: document-parsing-worker
    # Default CMD in Dockerfile is ./docker-entrypoint-worker.sh
    environment:
      CELERY_CONCURRENCY: ${DOCUMENT_PARSING_CONCURRENCY:-2}
      CELERY_QUEUE: ${CELERY_QUEUE:-parse_queue}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DATABASE_URL: postgresql://datahub:datahub@postgres:5432/datahub
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      S3_ENDPOINT_URL: http://minio:9000
      S3_BUCKET: ${DOCUMENT_PARSING_BUCKET:-document-parsing}
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_DEFAULT_REGION: ap-southeast-1
      MINERU_MODELS_DIR: /opt/mineru/models_onnx
      MINERU_DPI: ${MINERU_DPI:-200}
      PDF_HYBRID_MODE: ${PDF_HYBRID_MODE:-true}
      PDF_FORCE_PLAIN: ${PDF_FORCE_PLAIN:-true}
      PARSE_TABLE_WIRELESS: ${PARSE_TABLE_WIRELESS:-false}
      DEVICE_LAYOUT: ${DEVICE_LAYOUT:-cpu}
      DEVICE_OCR_DET: ${DEVICE_OCR_DET:-cpu}
      DEVICE_OCR_REC: ${DEVICE_OCR_REC:-cpu}
      DEVICE_ORIENT: ${DEVICE_ORIENT:-cpu}
      DEVICE_TABLE_CLS: ${DEVICE_TABLE_CLS:-cpu}
      DEVICE_TABLE_REC: ${DEVICE_TABLE_REC:-cpu}
      SSL_CERT_FILE: /etc/ssl/certs/ca-certificates.crt
      PYTHONUNBUFFERED: "1"
    volumes:
      - ./document-parsing/src:/app/src:ro
      - ./document-parsing/models/models_onnx:/opt/mineru/models_onnx:ro
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
      document-parsing-api:
        condition: service_started
    restart: unless-stopped

